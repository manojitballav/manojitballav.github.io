name: Update Google Certified Devices

on:
  schedule:
    # Runs every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest device list
        run: |
          curl -sL "https://storage.googleapis.com/play_public/supported_devices.csv" -o /tmp/devices_raw.csv

      - name: Convert UTF-16 to UTF-8
        run: |
          iconv -f UTF-16 -t UTF-8 /tmp/devices_raw.csv > data/supported_devices.csv

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet data/supported_devices.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/supported_devices.csv
          DEVICE_COUNT=$(wc -l < data/supported_devices.csv | tr -d ' ')
          git commit -m "Update Google certified devices list ($DEVICE_COUNT entries)"
          git push
